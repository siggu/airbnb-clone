databases:
  - name: airbnbclone
    databaseName: airbnbclone
    user: airbnbclone
    region: singapore

services:
  - type: web
    name: airbnbclone
    runtime: python
    region: singapore
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: airbnbclone
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GH_SECRET
        sync: false
      - key: WEB_CONCURRENCY
        value: 4
      - key: RENDER
        value: true
